name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'platform/**'
      - 'apps/**'
      - 'tests/**'
      - '*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches: [main]
    paths:
      - 'platform/**'
      - 'apps/**'
      - 'tests/**'
      - '*.py'
      - 'pyproject.toml'
      - 'uv.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12']
        split-group: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage (split across runners)
        # pytest-split selects tests at collection time (horizontal scaling),
        # pytest-xdist parallelises them across CPU cores (vertical scaling).
        # --dist=loadfile groups tests by file to prevent state collisions.
        run: >
          uv run pytest -v --tb=short
          -m "not integration and not slow and not external and not quarantine"
          -n auto
          --dist=loadfile
          --splitting-algorithm=least_duration
          --splits=${{ strategy.job-total }}
          --group=${{ matrix.split-group }}
          --store-durations
          --cov=platform --cov-branch
          --cov-report=xml:coverage.xml
          --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: always()  # Upload coverage even if tests fail
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu' || matrix.os == 'macos-latest' && 'macos' || matrix.os == 'windows-latest' && 'windows' }},python-${{ matrix.python-version }}
          name: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu' || matrix.os == 'macos-latest' && 'macos' || matrix.os == 'windows-latest' && 'windows' }}-py${{ matrix.python-version }}-group${{ matrix.split-group }}
          fail_ci_if_error: false
          verbose: true

      - name: Test package installation
        run: |
          uv pip install -e platform/primitives/
