name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'ttadev/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/ci.yml'

# Security: Explicit minimal permissions
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Gate 1: Quality checks (fast, fail-first) ─────────────────────────────
  quality-gates:
    name: Quality Gates (Linting & Type Checking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright type check
        continue-on-error: true
        run: uvx pyright ttadev/

      - name: Validate #dev-todo compliance
        run: |
          set -euo pipefail
          echo "🔍 Validating #dev-todo compliance..."

          todos=$(grep -rn "#dev-todo" --include="*.md" --include="*.py" . \
            | grep -v "^\.\/docs\/" \
            | grep -v "^\.\/scripts\/" \
            | grep -v "^\.\/logseq\/" \
            | grep -v "^\.\/\.github\/" \
            | grep -v "^\.\/\.agents\/" \
            | grep -v "^\.\/CHANGELOG" \
            | grep -v "^\.\/SESSION_" \
            | grep -v "^\.\/[A-Z_]*\.md:" \
            | grep -v "^\.\/tests\/test_issue_manager" \
            | grep -v "^\.\/\.cline\/" \
            | grep -v "^\.\/\.agents\/" \
            || true)

          if [ -z "$todos" ]; then
            echo "✅ No #dev-todos found"
            exit 0
          fi

          invalid_todos=()
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            line_num=$(echo "$line" | cut -d: -f2)
            context=$(sed -n "${line_num},$((line_num + 5))p" "$file")
            has_type=$(echo "$context" | grep -c "type::" || true)
            has_priority=$(echo "$context" | grep -c "priority::" || true)
            has_package=$(echo "$context" | grep -c "package::" || true)
            if [ "$has_type" -eq 0 ] || [ "$has_priority" -eq 0 ] || [ "$has_package" -eq 0 ]; then
              invalid_todos+=("$file:$line_num - Missing properties (type::, priority::, package::)")
            fi
          done <<< "$todos"

          if [ ${#invalid_todos[@]} -gt 0 ]; then
            echo "❌ Found ${#invalid_todos[@]} invalid #dev-todo(s):"
            printf '%s\n' "${invalid_todos[@]}"
            echo ""
            echo "Each #dev-todo must have within 5 lines: type::, priority::, package::"
            exit 1
          fi

          echo "✅ All #dev-todos are properly formatted"

  # ── Gate 2: Unit tests (Python 3.12, Ubuntu — fast PR feedback) ───────────
  test:
    name: Unit Tests (Python 3.12, Ubuntu)
    needs: quality-gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: >
          uv run pytest -v --tb=short
          -m "not integration and not slow and not external and not quarantine"
          --cov=ttadev --cov-branch
          --cov-report=xml:coverage.xml
          --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ubuntu,python-3.12
          fail_ci_if_error: false

      - name: Validate package import
        run: uv run python -c "from ttadev.primitives.core.base import WorkflowPrimitive; print('Package OK')"
