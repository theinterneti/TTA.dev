name: CI Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Automatically cancel in-progress runs for the same PR to save compute costs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Pytest Split ${{ matrix.group }} / ${{ strategy.job-total }}"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        # Horizontal scaling: split the test suite across 4 parallel runners.
        # Each runner executes only its fractional share of the total tests.
        group: [1, 2, 3, 4]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --dev

      - name: Restore test durations cache
        uses: actions/cache@v4
        with:
          path: .test_durations
          key: test-durations-${{ hashFiles('tests/**', 'platform/primitives/tests/**') }}
          restore-keys: |
            test-durations-

      - name: Run pytest (Distributed & Split)
        # -n auto: Vertical scaling via pytest-xdist (uses all CPU cores on the runner)
        # --dist=loadfile: Group tests by file to prevent state collisions
        # --splits / --group: Horizontal scaling via pytest-split (divides suite across matrix runners)
        # --store-durations: Records test durations to optimise future splits
        run: |
          uv run pytest \
            -v --tb=short \
            -m "not integration and not slow and not external and not quarantine" \
            -n auto \
            --dist=loadfile \
            --splits ${{ strategy.job-total }} \
            --group ${{ matrix.group }} \
            --splitting-algorithm=least_duration \
            --store-durations

      - name: Upload test durations
        if: always() && matrix.group == 1
        uses: actions/upload-artifact@v4
        with:
          name: test-durations
          path: .test_durations
          retention-days: 30
