[project]
name = "python-pathway"
version = "0.1.0"
description = "Python code analysis utilities integrating with TTA.dev workflow primitives"
authors = [{ name = "TTA Development Team" }]
readme = "README.md"
requires-python = ">=3.11"
license = { file = "LICENSE" }
dependencies = [
    "pydantic>=2.0",
    "tta-dev-primitives",
]

[tool.uv.sources]
tta-dev-primitives = { workspace = true }

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "UP", "ANN"]
ignore = ["E501", "ANN101", "ANN102", "ANN401"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["ANN", "E501", "E402", "N806"]
"examples/**/*.py" = ["ANN", "E501", "E402", "N806"]
