[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
addopts = -v --tb=short
markers =
    unit: fast, isolated unit tests (no external services)
    integration: mark test as integration test (opt-in only)
    asyncio: mark test as async test
    workflow_proof: end-to-end L0 workflow proof tests
    slow: slow tests
    external: tests requiring external APIs
