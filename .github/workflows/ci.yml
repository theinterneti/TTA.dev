name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'ttadev/**'
      - 'apps/**'
      - 'tests/**'
      - '*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches: [main]
    paths:
      - 'ttadev/**'
      - 'apps/**'
      - 'tests/**'
      - '*.py'
      - 'pyproject.toml'
      - 'uv.lock'

# Security: Explicit minimal permissions
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality gates run first - fast fail on linting/type issues
  quality-gates:
    name: Quality Gates (Linting & Type Checking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@797cf5c0a210b8b257f62fe1fbf9a46b4fc201bf  # v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check (linting)
        run: uv run ruff check .

      - name: Run ruff format --check (formatting)
        run: uv run ruff format --check .

      - name: Run pyright (type checking)
        continue-on-error: true
        run: uvx pyright ttadev/

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: quality-gates  # Only run tests if quality gates pass
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # requires-python = ">=3.12" — only test supported versions.
        # Ubuntu is the primary deployment target; macOS covers dev machines.
        # Windows is excluded: this is a server-side library.
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.12', '3.13']

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@797cf5c0a210b8b257f62fe1fbf9a46b4fc201bf  # v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage enforcement
        env:
          PYTHONUTF8: '1'  # Ensure UTF-8 output on all platforms
        run: >
          uv run pytest -v --tb=short
          -m "not integration and not slow and not external and not quarantine"
          --cov=ttadev --cov-branch
          --cov-report=xml:coverage.xml
          --cov-report=term-missing
          --cov-fail-under=80

      - name: Upload coverage to Codecov
        if: always()  # Upload coverage even if tests fail
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os }},python-${{ matrix.python-version }}
          name: ${{ matrix.os }}-py${{ matrix.python-version }}
          fail_ci_if_error: false
          verbose: true

      - name: Validate ttadev primitives package
        run: |
          uv run python -c "from ttadev.primitives.core.base import WorkflowPrimitive; print('Package validated OK')"
