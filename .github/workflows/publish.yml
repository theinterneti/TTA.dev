name: Publish to PyPI

# Manually triggered via workflow_dispatch to publish a specific tag to PyPI.
# Before using this workflow, complete the one-time setup described in PUBLISHING.md.
#
# This active workflow currently publishes the root `ttadev` package only.
# Historical package tags like `packages/primitives/v...` belonged to an older
# multi-package layout and are not the current default release path.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish (e.g. packages/ttadev/v0.1.0)'
        required: true
        type: string

permissions:
  id-token: write  # Required for OIDC trusted publishing
  contents: read

jobs:
  extract-package:
    name: Determine package from tag
    runs-on: ubuntu-latest
    outputs:
      package-dir: ${{ steps.extract.outputs.package-dir }}
      package-path: ${{ steps.extract.outputs.package-path }}
      package-name: ${{ steps.extract.outputs.package-name }}
      version: ${{ steps.extract.outputs.version }}
    steps:
      - id: extract
        name: Extract package info from tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          # Tag format: packages/{dir}/v{semver}
          if [[ "$TAG" =~ ^packages/([^/]+)/v(.+)$ ]]; then
            PKG_DIR="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
          else
            echo "ERROR: Tag '$TAG' does not match 'packages/{dir}/v{semver}'" >&2
            exit 1
          fi

          # Map current tag dirs to active package metadata
          declare -A DIR_TO_NAME=(
            ["ttadev"]="ttadev"
          )
          declare -A DIR_TO_PATH=(
            ["ttadev"]="."
          )

          PKG_NAME="${DIR_TO_NAME[$PKG_DIR]}"
          PKG_PATH="${DIR_TO_PATH[$PKG_DIR]}"
          if [[ -z "$PKG_NAME" || -z "$PKG_PATH" ]]; then
            echo "ERROR: Unknown package directory '$PKG_DIR'" >&2
            echo "Known dirs: ${!DIR_TO_NAME[*]}" >&2
            exit 1
          fi

          echo "package-dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
          echo "package-path=$PKG_PATH" >> "$GITHUB_OUTPUT"
          echo "package-name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing $PKG_NAME v$VERSION from $PKG_PATH"

  build-and-publish:
    name: Build and publish ${{ needs.extract-package.outputs.package-name }}
    needs: extract-package
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Build package
        working-directory: ${{ needs.extract-package.outputs.package-path }}
        run: uv build --out-dir dist

      - name: Verify built artifacts
        working-directory: ${{ needs.extract-package.outputs.package-path }}
        run: |
          ls -la dist/
          # Ensure we have both wheel and sdist
          WHEEL_COUNT=$(ls dist/*.whl 2>/dev/null | wc -l)
          SDIST_COUNT=$(ls dist/*.tar.gz 2>/dev/null | wc -l)
          if [[ "$WHEEL_COUNT" -eq 0 ]]; then
            echo "ERROR: No wheel found in dist/" >&2
            exit 1
          fi
          if [[ "$SDIST_COUNT" -eq 0 ]]; then
            echo "ERROR: No sdist found in dist/" >&2
            exit 1
          fi
          echo "Built: $(ls dist/)"

      - name: Publish to PyPI (OIDC)
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1
        with:
          packages-dir: ${{ needs.extract-package.outputs.package-path }}/dist/
          print-hash: true
