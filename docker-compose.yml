services:
  # ---------------------------------------------------------------------------
  # Observability stack
  # Usage: docker compose --profile observability up
  # ---------------------------------------------------------------------------

  # Jaeger - Distributed tracing (UI, collector, query, agent all-in-one)
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: tta-jaeger
    restart: unless-stopped
    profiles: ["observability", "test"]
    ports:
      - "5775:5775/udp" # Zipkin compact thrift
      - "6831:6831/udp" # Jaeger compact thrift
      - "6832:6832/udp" # Jaeger binary thrift
      - "5778:5778"     # Serve configs
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # Jaeger collector HTTP
      - "14250:14250"   # Jaeger collector gRPC
      - "9411:9411"     # Zipkin compatible endpoint
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - tta-observability

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: tta-prometheus
    restart: unless-stopped
    profiles: ["observability", "test"]
    ports:
      - "9090:9090"
    volumes:
      - ./platform/primitives/tests/integration/config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - tta-observability

  # Grafana - Metrics and trace visualization
  grafana:
    image: grafana/grafana:10.2.3
    container_name: tta-grafana
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./platform/primitives/tests/integration/config/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    networks:
      - tta-observability
    depends_on:
      - prometheus
      - jaeger

  # OpenTelemetry Collector - Receives, processes, and exports telemetry data
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: tta-otel-collector
    restart: unless-stopped
    profiles: ["observability", "test"]
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
      - "13133:13133" # Health check
    volumes:
      - ./platform/primitives/tests/integration/config/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    command: ["--config=/etc/otel-collector-config.yml"]
    networks:
      - tta-observability
    depends_on:
      - jaeger
      - prometheus

  # Prometheus Pushgateway - Metrics ingestion for short-lived processes (e.g. git hooks)
  pushgateway:
    image: prom/pushgateway:v1.6.2
    container_name: tta-pushgateway
    restart: unless-stopped
    profiles: ["observability", "test"]
    ports:
      - "9091:9091"
    networks:
      - tta-observability

networks:
  tta-observability:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
