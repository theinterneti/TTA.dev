name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'ttadev/**'
      - 'apps/**'
      - 'tests/**'
      - '*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  push:
    branches: [main]
    paths:
      - 'ttadev/**'
      - 'apps/**'
      - 'tests/**'
      - '*.py'
      - 'pyproject.toml'
      - 'uv.lock'

# Security: Explicit minimal permissions
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Quality gates run first - fast fail on linting/type issues
  quality-gates:
    name: Quality Gates (Linting & Type Checking)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check (linting)
        run: uv run ruff check .

      - name: Run ruff format --check (formatting)
        run: uv run ruff format --check .

      - name: Run pyright (type checking)
        run: uvx pyright ttadev/observability/ ttadev/primitives/

      - name: Validate #dev-todo compliance
        run: |
          #!/bin/bash
          set -euo pipefail
          
          echo "🔍 Validating #dev-todo compliance..."
          
          # Find all TODOs with #dev-todo tag (excluding documentation)
          todos=$(grep -rn "#dev-todo" --include="*.md" --include="*.py" . | grep -v "^\.\/docs\/" | grep -v "^\.\/\.github\/workflows\/.*\.md" || true)
          
          if [ -z "$todos" ]; then
            echo "✅ No #dev-todos found"
            exit 0
          fi
          
          # Check each #dev-todo has required properties
          invalid_todos=()
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            line_num=$(echo "$line" | cut -d: -f2)
            content=$(echo "$line" | cut -d: -f3-)
            
            # Check if this TODO has required properties within next 5 lines
            context=$(sed -n "${line_num},$((line_num + 5))p" "$file")
            
            has_type=$(echo "$context" | grep -c "type::" || true)
            has_priority=$(echo "$context" | grep -c "priority::" || true)
            has_package=$(echo "$context" | grep -c "package::" || true)
            
            if [ "$has_type" -eq 0 ] || [ "$has_priority" -eq 0 ] || [ "$has_package" -eq 0 ]; then
              invalid_todos+=("$file:$line_num - Missing properties (type::, priority::, package::)")
            fi
          done <<< "$todos"
          
          if [ ${#invalid_todos[@]} -gt 0 ]; then
            echo "❌ Found ${#invalid_todos[@]} invalid #dev-todo(s):"
            printf '%s\n' "${invalid_todos[@]}"
            echo ""
            echo "Each #dev-todo must have within 5 lines:"
            echo "  - type:: (e.g., implementation, bugfix, documentation)"
            echo "  - priority:: (e.g., high, medium, low)"
            echo "  - package:: (e.g., primitives, observability, agent-coordination)"
            exit 1
          fi
          
          echo "✅ All #dev-todos are properly formatted"

  test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    needs: quality-gates  # Only run tests if quality gates pass
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13', '3.14']
        split-group: [1, 2, 3]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage enforcement
        # pytest-split selects tests at collection time (horizontal scaling),
        # pytest-xdist parallelises them across CPU cores (vertical scaling).
        # --dist=loadfile groups tests by file to prevent state collisions.
        # --cov-fail-under=80 enforces baseline coverage (matches codecov.yml)
        run: >
          uv run pytest -v --tb=short
          -m "not integration and not slow and not external and not quarantine"
          -n auto
          --dist=loadfile
          --splitting-algorithm=least_duration
          --splits=${{ strategy.job-total }}
          --group=${{ matrix.split-group }}
          --store-durations
          --cov=platform --cov-branch
          --cov-fail-under=80
          --cov-report=xml:coverage.xml
          --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: always()  # Upload coverage even if tests fail
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu' || matrix.os == 'macos-latest' && 'macos' || matrix.os == 'windows-latest' && 'windows' }},python-${{ matrix.python-version }}
          name: ${{ matrix.os == 'ubuntu-latest' && 'ubuntu' || matrix.os == 'macos-latest' && 'macos' || matrix.os == 'windows-latest' && 'windows' }}-py${{ matrix.python-version }}-group${{ matrix.split-group }}
          fail_ci_if_error: false
          verbose: true

      - name: Validate tta-dev-primitives package
        run: |
          python -c "from ttadev.primitives.core.base import WorkflowPrimitive; print('✅ Package validated')"
