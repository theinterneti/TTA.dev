name: Release to GitHub

# Triggered by tags in the form: packages/{dir}/v{semver}
# Example: packages/ttadev/v0.1.0
#
# This is the low-key alternative to PyPI publishing for the active root `ttadev`
# package. Historical `packages/primitives/v...` tags belonged to an older
# multi-package layout and are not the current default release path.
#
# Install a released package directly:
#   uv pip install https://github.com/theinterneti/TTA.dev/releases/download/packages/ttadev/v0.1.0/ttadev-0.1.0-py3-none-any.whl
#   uv add https://github.com/theinterneti/TTA.dev/releases/download/packages/ttadev/v0.1.0/ttadev-0.1.0-py3-none-any.whl

on:
  push:
    tags:
      - "packages/*/v*.*.*"

permissions:
  contents: write  # Required to create GitHub Releases and upload assets

jobs:
  extract-package:
    name: Determine package from tag
    runs-on: ubuntu-latest
    outputs:
      package-dir: ${{ steps.extract.outputs.package-dir }}
      package-path: ${{ steps.extract.outputs.package-path }}
      package-name: ${{ steps.extract.outputs.package-name }}
      version: ${{ steps.extract.outputs.version }}
    steps:
      - id: extract
        name: Extract package info from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Tag format: packages/{dir}/v{semver}
          if [[ "$TAG" =~ ^packages/([^/]+)/v(.+)$ ]]; then
            PKG_DIR="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
          else
            echo "ERROR: Tag '$TAG' does not match 'packages/{dir}/v{semver}'" >&2
            exit 1
          fi

          # Map current tag dirs to active package metadata
          declare -A DIR_TO_NAME=(
            ["ttadev"]="ttadev"
          )
          declare -A DIR_TO_PATH=(
            ["ttadev"]="."
          )

          PKG_NAME="${DIR_TO_NAME[$PKG_DIR]}"
          PKG_PATH="${DIR_TO_PATH[$PKG_DIR]}"
          if [[ -z "$PKG_NAME" || -z "$PKG_PATH" ]]; then
            echo "ERROR: Unknown package directory '$PKG_DIR'" >&2
            echo "Known dirs: ${!DIR_TO_NAME[*]}" >&2
            exit 1
          fi

          echo "package-dir=$PKG_DIR" >> "$GITHUB_OUTPUT"
          echo "package-path=$PKG_PATH" >> "$GITHUB_OUTPUT"
          echo "package-name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing $PKG_NAME v$VERSION from $PKG_PATH"

  build-and-release:
    name: Build and release ${{ needs.extract-package.outputs.package-name }}
    needs: extract-package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a  # v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Build package
        working-directory: ${{ needs.extract-package.outputs.package-path }}
        run: uv build --out-dir dist

      - name: Verify built artifacts
        working-directory: ${{ needs.extract-package.outputs.package-path }}
        run: |
          ls -la dist/
          WHEEL_COUNT=$(ls dist/*.whl 2>/dev/null | wc -l)
          SDIST_COUNT=$(ls dist/*.tar.gz 2>/dev/null | wc -l)
          if [[ "$WHEEL_COUNT" -eq 0 ]]; then
            echo "ERROR: No wheel found in dist/" >&2
            exit 1
          fi
          if [[ "$SDIST_COUNT" -eq 0 ]]; then
            echo "ERROR: No sdist found in dist/" >&2
            exit 1
          fi
          echo "Built: $(ls dist/)"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PKG_NAME="${{ needs.extract-package.outputs.package-name }}"
          VERSION="${{ needs.extract-package.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          DIST_DIR="${{ needs.extract-package.outputs.package-path }}/dist"
          REPO="${{ github.repository }}"

          WHEEL_FILE=$(ls "$DIST_DIR"/*.whl | head -1 | xargs basename)
          BASE_URL="https://github.com/$REPO/releases/download/$TAG"

          cat > /tmp/release-notes.md << EOF
          ## $PKG_NAME v$VERSION

          ### Install

          \`\`\`bash
          # Install directly from this release (no PyPI needed)
          uv pip install $BASE_URL/$WHEEL_FILE

          # Or with uv add (adds to project dependencies)
          uv add $BASE_URL/$WHEEL_FILE
          \`\`\`

          ### Assets
          - Wheel (\`.whl\`): ready-to-install binary distribution
          - Source distribution (\`.tar.gz\`): source archive
          EOF

          gh release create "$TAG" \
            --title "$PKG_NAME v$VERSION" \
            --notes-file /tmp/release-notes.md \
            $DIST_DIR/*.whl $DIST_DIR/*.tar.gz
