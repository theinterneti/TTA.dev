name: Local CI & OpenHands Review

# Runs ONLY on pull requests — quality gates on push are handled by ci.yml
# (GitHub-hosted) and consolidated-merge-gate.yml.  This workflow provides
# what only the local self-hosted runner can: an Ollama-backed OpenHands
# AI code review posted as a PR comment.
#
# Model priority (openhands_pr_review.py):
#   1. ollama/gemma3:4b  — local GPU, non-thinking, no quota
#   2. openrouter free   — cloud fallback if OPENROUTER_API_KEY is set
#   3. gemini free       — cloud fallback if GOOGLE_API_KEY is set
#   Always exits 0 — never blocks CI.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [main]
    paths:
      - 'ttadev/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:

  openhands-review:
    name: OpenHands Code Review
    runs-on: [self-hosted, local]
    timeout-minutes: 20
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenHands PR review
        working-directory: /home/theinterneti/Repos/TTA.dev
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          OLLAMA_BASE_URL: http://localhost:11434
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          uv run python scripts/ci/openhands_pr_review.py \
            --pr "$PR_NUMBER" \
            --base "$BASE_REF" \
            --head "$HEAD_SHA"
