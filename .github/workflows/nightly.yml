name: Nightly Cross-Platform

on:
  schedule:
    - cron: '0 2 * * *'   # 2 AM UTC daily
  workflow_dispatch:        # Manual trigger for on-demand runs

permissions:
  contents: read

jobs:
  matrix-test:
    name: Test (Python ${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@f0ec1fc3b38f5e7cd731bb6ce540c5af426746bb  # v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run unit tests
        run: >
          uv run pytest -v --tb=short
          -m "not integration and not slow and not external and not quarantine"
          --cov=ttadev --cov-branch
          --cov-report=xml:coverage.xml
          --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: nightly,${{ matrix.os }},python-${{ matrix.python-version }}
          fail_ci_if_error: false

      - name: Validate package import
        run: uv run python -c "from ttadev.primitives.core.base import WorkflowPrimitive; print('Package OK')"
