<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTA.dev Observability Dashboard</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
  <header id="app-header">
    <!-- Rendered by app.js -->
  </header>

  <!-- Tab bar -->
  <nav id="tab-bar" role="tablist" aria-label="Dashboard tabs">
    <button class="tab-btn active" data-tab="sessions" role="tab" aria-selected="true">Sessions</button>
    <button class="tab-btn" data-tab="live" role="tab" aria-selected="false">
      <span class="live-dot" aria-hidden="true"></span>Live
    </button>
    <button class="tab-btn" data-tab="fleet" role="tab" aria-selected="false">Fleet</button>
    <button class="tab-btn" data-tab="cost" role="tab" aria-selected="false">💰 Cost</button>
    <button class="tab-btn" data-tab="dag" role="tab" aria-selected="false">🔗 Workflow DAG</button>
  </nav>

  <!-- Sessions tab content -->
  <div id="tab-sessions" class="tab-panel" role="tabpanel">
    <div id="app-layout">
      <nav id="session-tree">
        <!-- Rendered by session-tree.js -->
      </nav>

      <main id="session-detail">
        <!-- Rendered by session-detail.js -->
      </main>

      <aside id="span-detail" hidden>
        <!-- Rendered by span-detail.js -->
      </aside>
    </div>

    <section id="cgc-graph-section">
      <!-- Rendered by cgc-graph.js -->
    </section>
  </div>

  <!-- Live agents tab content -->
  <div id="tab-live" class="tab-panel" role="tabpanel" hidden>
    <div id="live-agents-panel">
      <div class="panel-heading">🟢 Active Agents</div>
      <div id="live-agents-grid">
        <!-- Agent cards rendered by app.js -->
      </div>
    </div>
  </div>

  <!-- Toast notification container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Fleet status tab content -->
  <div id="tab-fleet" class="tab-panel" role="tabpanel" hidden>
    <div id="fleet-panel">
      <div class="panel-heading">🚀 Fleet Status</div>
      <table id="fleet-runs-table">
        <thead>
          <tr>
            <th>Agent Role</th>
            <th>Task ID</th>
            <th>Status</th>
            <th>Elapsed</th>
            <th>Lease TTL</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="fleet-runs-body">
          <!-- Rows rendered by app.js -->
        </tbody>
      </table>
      <div id="fleet-empty-state" class="live-empty-state" hidden>
        <div class="empty-icon">🚀</div>
        <p>No active runs.</p>
        <small>Start an agent workflow to see fleet activity.</small>
      </div>
      <!-- Gate-blocked tasks panel -->
      <div id="fleet-gates-section" hidden>
        <div class="panel-heading">🔒 Pending Gates</div>
        <table id="fleet-gates-table">
          <thead>
            <tr>
              <th>Task ID</th>
              <th>Gate</th>
              <th>Type</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="fleet-gates-body">
            <!-- Rows rendered by app.js -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Cost / Quality tab content -->
  <div id="tab-cost" class="tab-panel" role="tabpanel" hidden>
    <div id="cost-panel">
      <div class="panel-heading">💰 Cost &amp; Quality</div>
      <div id="cost-content">
        <!-- Rendered by app.js -->
      </div>
    </div>
  </div>

  <!-- Workflow DAG tab content -->
  <div id="tab-dag" class="tab-panel" role="tabpanel" hidden>
    <div id="dag-panel">
      <div class="panel-heading">🔗 Workflow DAG</div>
      <div id="dag-content">
        <!-- Rendered by workflow-dag.js -->
      </div>
    </div>
  </div>

  <script type="module" src="/static/js/app.js"></script>
</body>
</html>
